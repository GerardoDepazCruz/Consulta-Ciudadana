<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Licencias</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_licencias.css') }}">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <!-- BOTON VOLVER -->
            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <!-- HEADER -->
            <div class="form-header">

                <h1>🚗 Formulario Licencias</h1>

                <p>
                    Complete todos los datos necesarios para registrar
                    su trámite de licencia municipal.
                </p>

            </div>

            <!-- FORM -->
            <form action="/guardar_licencia" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Tipo Resolución</label>
                        <input type="text" name="tipo_resolucion">
                    </div>

                    <div class="input-group">
                        <label>Expediente</label>
                        <input type="text" name="expediente">
                    </div>

                    <div class="input-group">
                        <label>Año Expediente</label>
                        <input type="text" name="anio_expediente">
                    </div>

                    <div class="input-group">
                        <label>RUC</label>
                        <input type="text" name="ruc">
                    </div>

                    <div class="input-group">
                        <label>Área</label>
                        <input type="text" name="area">
                    </div>

                    <div class="input-group">
                        <label>Costo Trámite</label>
                        <input type="text" name="costo_tramite">
                    </div>

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="departamento">
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="provincia">
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="distrito">
                    </div>

                    <div class="input-group">
                        <label>Ubigeo</label>
                        <input type="text" name="ubigeo">
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

            </form>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

</body>

</html>
