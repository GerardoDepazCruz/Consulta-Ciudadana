<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Licencias</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_licencias.css') }}">

    <style>

        .input-error{
            border:2px solid #e53935 !important;
            background:#fff5f5;
        }

        .error-text{
            color:#e53935;
            font-size:13px;
            margin-top:6px;
            font-weight:600;
            display:none;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="form-card">

            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <div class="form-header">

                <h1>🚗 Formulario Licencias</h1>

                <p>
                    Complete todos los datos necesarios para registrar
                    su trámite de licencia municipal.
                </p>

            </div>

            <form id="formLicencia" action="/guardar_licencia" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Tipo Resolución</label>
                        <input type="text" name="tipo_resolucion">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Expediente</label>
                        <input type="text" name="expediente">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Año Expediente</label>
                        <input type="text" name="anio_expediente">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>RUC</label>
                        <input type="text" name="ruc">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Área</label>
                        <input type="text" name="area">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Costo Trámite</label>
                        <input type="text" name="costo_tramite">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="departamento">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="provincia">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="distrito">
                        <div class="error-text"></div>
                    </div>

                    <div class="input-group">
                        <label>Ubigeo</label>
                        <input type="text" name="ubigeo">
                        <div class="error-text"></div>
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

                <div id="mensajeGuardando" style="
                    display:none;
                    margin-top:15px;
                    text-align:center;
                    color:#667eea;
                    font-weight:600;
                    animation:pulse 1s infinite;
                ">
                    ⏳ Guardando licencia...
                </div>

            </form>

        </div>

    </div>
    
     <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

    <script>

        const formLicencia = document.getElementById('formLicencia');

        formLicencia.addEventListener('submit', function (e) {

            e.preventDefault();

            let valido = true;

            const grupos = document.querySelectorAll('.input-group');

            grupos.forEach(grupo => {

                const input = grupo.querySelector('input');
                const error = grupo.querySelector('.error-text');
                const label = grupo.querySelector('label').innerText;

                input.classList.remove('input-error');
                error.style.display = 'none';

                if(input.value.trim() === ''){

                    valido = false;

                    input.classList.add('input-error');

                    error.innerHTML = `⚠️ ${label} es obligatorio`;
                    error.style.display = 'block';
                }

            });

            if(!valido){
                return;
            }

            document.getElementById('mensajeGuardando').style.display = 'block';

            setTimeout(() => {
                formLicencia.submit();
            }, 2000);

        });

    </script>

</body>

</html>
