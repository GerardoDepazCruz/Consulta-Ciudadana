<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Partidas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_partidas.css') }}">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <div class="form-header">

                <h1>📄 Formulario Partidas</h1>

                <p>
                    Complete los datos para registrar
                    una solicitud de partidas.
                </p>

            </div>

            <form id="formPartida" action="/guardar_partida" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Año Inscripción</label>
                        <input type="text" name="anio_inscripcion">
                    </div>

                    <div class="input-group">
                        <label>Mes Inscripción</label>
                        <input type="text" name="mes_inscripcion">
                    </div>

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="depa_cont_l">
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="prov_pais_l">
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="dist_ciud_l">
                    </div>

                    <div class="input-group">
                        <label>Nacionalidad</label>
                        <input type="text" name="nacional_l">
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

                <div id="mensajeGuardandoPartida" style="
                    display:none;
                    margin-top:15px;
                    text-align:center;
                    color:#667eea;
                    font-weight:600;
                    animation:pulse 1s infinite;
                ">
                    ⏳ Guardando partida...
                </div>

            </form>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

    <script>

        const formPartida = document.getElementById('formPartida');

        formPartida.addEventListener('submit', function (e) {

            e.preventDefault();

            document.getElementById('mensajeGuardandoPartida').style.display = 'block';

            setTimeout(() => {
                formPartida.submit();
            }, 2000);

        });

    </script>

</body>

</html>
