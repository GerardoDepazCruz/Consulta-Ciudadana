<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Partidas</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_partidas.css') }}">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <div class="form-header">

                <h1>📄 Formulario Partidas</h1>

                <p>
                    Complete los datos para registrar
                    una solicitud de partidas.
                </p>

            </div>

            <form id="formPartida" action="/guardar_partida" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Año Inscripción</label>
                        <input type="text" name="anio_inscripcion" id="anio_inscripcion">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Mes Inscripción</label>
                        <input type="text" name="mes_inscripcion" id="mes_inscripcion">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="depa_cont_l" id="depa_cont_l">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="prov_pais_l" id="prov_pais_l">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="dist_ciud_l" id="dist_ciud_l">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Nacionalidad</label>
                        <input type="text" name="nacional_l" id="nacional_l">
                        <small class="error-text"></small>
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

                <div id="mensajeGuardandoPartida" style="
                    display:none;
                    margin-top:15px;
                    text-align:center;
                    color:#667eea;
                    font-weight:600;
                    animation:pulse 1s infinite;
                ">
                    ⏳ Guardando partida...
                </div>

            </form>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

    <script>

        const formPartida = document.getElementById('formPartida');

        const campos = [
            {
                id: 'anio_inscripcion',
                mensaje: 'Ingrese el año de inscripción'
            },
            {
                id: 'mes_inscripcion',
                mensaje: 'Ingrese el mes de inscripción'
            },
            {
                id: 'depa_cont_l',
                mensaje: 'Ingrese el departamento'
            },
            {
                id: 'prov_pais_l',
                mensaje: 'Ingrese la provincia'
            },
            {
                id: 'dist_ciud_l',
                mensaje: 'Ingrese el distrito'
            },
            {
                id: 'nacional_l',
                mensaje: 'Ingrese la nacionalidad'
            }
        ];

        function mostrarError(input, mensaje) {

            input.classList.add('input-error');

            const error = input.parentElement.querySelector('.error-text');

            error.textContent = mensaje;
        }

        function limpiarError(input) {

            input.classList.remove('input-error');

            const error = input.parentElement.querySelector('.error-text');

            error.textContent = '';
        }

        campos.forEach(campo => {

            const input = document.getElementById(campo.id);

            input.addEventListener('input', () => {
                limpiarError(input);
            });

        });

        formPartida.addEventListener('submit', function (e) {

            e.preventDefault();

            let valido = true;

            campos.forEach(campo => {

                const input = document.getElementById(campo.id);

                if (input.value.trim() === '') {

                    mostrarError(input, campo.mensaje);

                    valido = false;

                } else {

                    limpiarError(input);

                }

            });

            if (!valido) {
                return;
            }

            document.getElementById('mensajeGuardandoPartida').style.display = 'block';

            setTimeout(() => {
                formPartida.submit();
            }, 2000);

        });

    </script>

</body>

</html>
