<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CABOT - Consulta Ciudadana</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
</head>

<body class="index-page">
    <div class="container">
        <div class="welcome-card">

            <!-- Header azul -->
            <div class="logo-container">
                <div class="logo-icon-wrap">
                    <img src="{{ url_for('static', filename='images/logo1.png') }}" alt="Logo"
                        style="width:50px;height:50px;object-fit:contain;">
                </div>
                <h1 class="welcome-title">CABOT</h1>
                <p class="welcome-subtitle">Consulta Ciudadana</p>
            </div>

            <!-- Cuerpo blanco -->
            <div class="card-body">

                <button class="btn btn-primary" onclick="window.location.href='/login'">
                    <img src="{{ url_for('static', filename='images/inicio.png') }}" style="width:22px;height:22px;">
                    Iniciar Sesión
                </button>

                <button class="btn btn-facial" onclick="window.location.href='/face_login_page'">
                    <img src="{{ url_for('static', filename='images/facial.png') }}" style="width:30px;height:26px;">
                    Reconocimiento Facial
                </button>

                <div class="divider"></div>

                <button class="btn btn-secondary" onclick="window.location.href='/register'">
                    ¿No tienes cuenta? Regístrate
                </button>

                <div class="info-text">
                    <p>🔹 Trámites municipales &nbsp;|&nbsp; 🔹 Citas en línea &nbsp;|&nbsp; 🔹 Asistente virtual</p>
                    <p>✨ Regístrate con tu rostro para un acceso más rápido</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Verificar si ya hay sesión
        fetch('/api/check_session')
            .then(res => res.json())
            .then(data => {
                if (data.logged_in) {
                    window.location.href = '/dashboard';
                }
            });
    </script>
</body>

</html>
