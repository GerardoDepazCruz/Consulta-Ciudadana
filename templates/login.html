<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CABOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_style.css') }}">
</head>

<body>
    <div class="container">
        <div class="form-card">

            <!-- Header azul -->
            <div class="card-header">
                <a href="/" class="back-link">← Volver</a>
                <div class="header-icon-wrap">
                    <img src="{{ url_for('static', filename='images/logo1.png') }}"
                        style="width:42px;height:42px;object-fit:contain;">
                </div>
                <h2 class="form-title">Iniciar Sesión</h2>
                <p class="form-subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <!-- Cuerpo blanco -->
            <div class="card-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" name="dni" maxlength="8" placeholder="12345678" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <img src="{{ url_for('static', filename='images/ingresar.png') }}"
                            style="width:28px;height:28px;object-fit:contain;">
                        Ingresar
                    </button>
                </form>

                <div class="divider"></div>

                <button class="btn btn-facial" onclick="window.location.href='/face_register'">
                    <img src="{{ url_for('static', filename='images/facial.png') }}" style="width:30px;height:26px;">
                    Reconocimiento Facial
                </button>

                <button class="btn btn-secondary" onclick="window.location.href='/register'">
                    ¿No tienes cuenta? Regístrate aquí
                </button>

                <div id="message" class="message"></div>
            </div>

        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const dni = document.getElementById('dni').value;
            const password = document.getElementById('password').value;

            messageDiv.innerHTML = '<div class="loading">Verificando credenciales...</div>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ dni, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="success">✅ ' + data.message + '</div>';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = '<div class="error">❌ ' + data.message + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">❌ Error de conexión</div>';
            }
        });
    </script>
</body>

</html>
