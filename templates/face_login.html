<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Facial - CABOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/face_login_style.css') }}">
</head>

<body>
    <div class="container">
        <div class="form-card">

            <!-- Header azul -->
            <div class="card-header">
                <a href="/" class="back-link">← Volver</a>
                <div class="header-icon-wrap">
                    <img src="{{ url_for('static', filename='images/facial.png') }}" style="width:30px;height:26px;">
                </div>
                <h2 class="form-title">Reconocimiento Facial</h2>
                <p class="form-subtitle">Mira directamente a la cámara para iniciar sesión</p>
            </div>

            <!-- Cuerpo blanco -->
            <div class="card-body">

                <div class="facial-step">
                    <p>📸 Colócate frente a la cámara, con buena iluminación</p>
                    <p class="step-hints">✅ Mira directamente &nbsp;|&nbsp; ✅ Sin gafas oscuras &nbsp;|&nbsp; ✅ Fondo
                        claro</p>
                </div>

                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>

                <button id="scanBtn" class="btn btn-primary">
                    <span class="btn-icon">🔍</span>
                    Escanear mi rostro
                </button>

                <button id="retryBtn" class="btn btn-facial" style="display:none;">
                    <span class="btn-icon">🔄</span>
                    Intentar de nuevo
                </button>

                <div id="statusMessage" class="status-info">
                    ⚡ Listo para escanear. Presiona "Escanear mi rostro"
                </div>

                <div class="divider"></div>

                <button class="btn btn-secondary" onclick="window.location.href='/face_register'">
                    ¿No has registrado tu rostro? Regístrate aquí
                </button>

                <button class="btn btn-facial" onclick="window.location.href='/login'">
                    Iniciar sesión con DNI y contraseña
                </button>

            </div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let stream = null;
        let scanning = false;

        const scanBtn = document.getElementById('scanBtn');
        const retryBtn = document.getElementById('retryBtn');
        const statusMessage = document.getElementById('statusMessage');

        async function initCamera() {
            try {
                if (stream) stream.getTracks().forEach(track => track.stop());
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
            } catch (err) {
                statusMessage.innerHTML = '❌ No se puede acceder a la cámara. Verifica los permisos.';
                statusMessage.className = 'status-error';
            }
        }

        initCamera();

        scanBtn.addEventListener('click', async () => {
            if (scanning) return;
            scanning = true;

            statusMessage.innerHTML = '📸 Escaneando rostro... Por favor espera.';
            statusMessage.className = 'status-info scanning';
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span class="btn-icon">⏳</span> Escaneando...';

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch('/api/verify_face_only', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                if (data.success) {
                    statusMessage.innerHTML = `✅ ${data.message}`;
                    statusMessage.className = 'status-success';
                    setTimeout(() => { window.location.href = '/dashboard'; }, 2000);
                } else {
                    statusMessage.innerHTML = `❌ ${data.message}`;
                    statusMessage.className = 'status-error';
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = '<span class="btn-icon">🔍</span> Escanear mi rostro';
                    retryBtn.style.display = 'flex';
                }
            } catch (error) {
                statusMessage.innerHTML = '❌ Error de conexión. Intenta de nuevo.';
                statusMessage.className = 'status-error';
                scanBtn.disabled = false;
                scanBtn.innerHTML = '<span class="btn-icon">🔍</span> Escanear mi rostro';
                retryBtn.style.display = 'flex';
            } finally {
                scanning = false;
            }
        });

        retryBtn.addEventListener('click', () => {
            statusMessage.innerHTML = '⚡ Listo para escanear. Presiona "Escanear mi rostro"';
            statusMessage.className = 'status-info';
            scanBtn.disabled = false;
            scanBtn.innerHTML = '<span class="btn-icon">🔍</span> Escanear mi rostro';
            retryBtn.style.display = 'none';
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>

</html>
