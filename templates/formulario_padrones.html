<!-- formulario_padron.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Padrones</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_padrones.css') }}">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <div class="form-header">

                <h1>📋 Formulario Padrones</h1>

                <p>
                    Complete los datos necesarios
                    para registrar un padrón.
                </p>

            </div>

            <form action="/guardar_padron" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="departamento">
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="provincia">
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="distrito">
                    </div>

                    <div class="input-group">
                        <label>Ubigeo</label>
                        <input type="text" name="ubigeo">
                    </div>

                    <div class="input-group">
                        <label>Tipo</label>
                        <input type="text" name="tipo">
                    </div>

                    <div class="input-group">
                        <label>Fecha Solicitud</label>
                        <input type="text" name="fecha_solicitud">
                    </div>

                    <div class="input-group">
                        <label>Razón Social</label>
                        <input type="text" name="razon_social">
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

            </form>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

</body>

</html>
