<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Padrones</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formulario_padrones.css') }}">

</head>

<body>

    <div class="container">

        <div class="form-card">

            <button class="btn-volver" onclick="window.location.href='/dashboard'">
                ← Volver
            </button>

            <div class="form-header">

                <h1>📋 Formulario Padrones</h1>

                <p>
                    Complete los datos necesarios
                    para registrar un padrón.
                </p>

            </div>

            <form id="formPadron" action="/guardar_padron" method="POST">

                <div class="form-grid">

                    <div class="input-group">
                        <label>Departamento</label>
                        <input type="text" name="departamento" id="departamento">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Provincia</label>
                        <input type="text" name="provincia" id="provincia">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Distrito</label>
                        <input type="text" name="distrito" id="distrito">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Ubigeo</label>
                        <input type="text" name="ubigeo" id="ubigeo">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Tipo</label>
                        <input type="text" name="tipo" id="tipo">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Fecha Solicitud</label>
                        <input type="text" name="fecha_solicitud" id="fecha_solicitud">
                        <small class="error-text"></small>
                    </div>

                    <div class="input-group">
                        <label>Razón Social</label>
                        <input type="text" name="razon_social" id="razon_social">
                        <small class="error-text"></small>
                    </div>

                </div>

                <button type="submit" class="btn-guardar">
                    Guardar Cita
                </button>

                <div id="mensajeGuardandoPadron" style="
                    display:none;
                    margin-top:15px;
                    text-align:center;
                    color:#667eea;
                    font-weight:600;
                    animation:pulse 1s infinite;
                ">
                    ⏳ Guardando padrón...
                </div>

            </form>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/cabot.js') }}"></script>

    <script>

        const formPadron = document.getElementById('formPadron');

        const campos = [
            {
                id: 'departamento',
                mensaje: 'Ingrese el departamento'
            },
            {
                id: 'provincia',
                mensaje: 'Ingrese la provincia'
            },
            {
                id: 'distrito',
                mensaje: 'Ingrese el distrito'
            },
            {
                id: 'ubigeo',
                mensaje: 'Ingrese el ubigeo'
            },
            {
                id: 'tipo',
                mensaje: 'Ingrese el tipo'
            },
            {
                id: 'fecha_solicitud',
                mensaje: 'Ingrese la fecha de solicitud'
            },
            {
                id: 'razon_social',
                mensaje: 'Ingrese la razón social'
            }
        ];

        function mostrarError(input, mensaje) {

            input.classList.add('input-error');

            const error = input.parentElement.querySelector('.error-text');

            error.textContent = mensaje;
        }

        function limpiarError(input) {

            input.classList.remove('input-error');

            const error = input.parentElement.querySelector('.error-text');

            error.textContent = '';
        }

        campos.forEach(campo => {

            const input = document.getElementById(campo.id);

            input.addEventListener('input', () => {
                limpiarError(input);
            });

        });

        formPadron.addEventListener('submit', function (e) {

            e.preventDefault();

            let valido = true;

            campos.forEach(campo => {

                const input = document.getElementById(campo.id);

                if (input.value.trim() === '') {

                    mostrarError(input, campo.mensaje);

                    valido = false;

                } else {

                    limpiarError(input);

                }

            });

            if (!valido) {
                return;
            }

            document.getElementById('mensajeGuardandoPadron').style.display = 'block';

            setTimeout(() => {
                formPadron.submit();
            }, 2000);

        });

    </script>

</body>

</html>
