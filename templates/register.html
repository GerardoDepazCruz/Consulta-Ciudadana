<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - CABOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register_style.css') }}">
    <style>
        .error-text {
            color: #c62828;
            font-size: 12px;
            margin-top: 4px;
            display: block;
        }
        input.error {
            border: 1.5px solid #c62828 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">

            <!-- Header azul -->
            <div class="card-header">
                <a href="/" class="back-link">ã Volver</a>
                <div class="header-icon-wrap">
                    <img src="{{ url_for('static', filename='images/logo1.png') }}"
                        style="width:42px;height:42px;object-fit:contain;">
                </div>
                <h2 class="form-title">Crear Cuenta</h2>
                <p class="form-subtitle">Completa tus datos para registrarte</p>
            </div>

            <!-- Cuerpo blanco -->
            <div class="card-body">
                <form id="registerForm">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombres">Nombres</label>
                            <input type="text" id="nombres" name="nombres" maxlength="30" placeholder="Juan Carlos" required>
                            <small id="nombresError" class="error-text"></small>
                        </div>
                        <div class="form-group">
                            <label for="apellidos">Apellidos</label>
                            <input type="text" id="apellidos" name="apellidos" maxlength="30" placeholder="Pûˋrez Gû°mez" required>
                            <small id="apellidosError" class="error-text"></small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dni">DNI</label>
                            <input type="text" id="dni" name="dni" maxlength="8" placeholder="12345678" required>
                            <small id="dniError" class="error-text"></small>
                        </div>
                        <div class="form-group">
                            <label for="celular">Celular</label>
                            <input type="tel" id="celular" name="celular" maxlength="9" placeholder="987654321" required>
                            <small id="celularError" class="error-text"></small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo Electrû°nico</label>
                        <input type="email" id="correo" name="correo" placeholder="juan@ejemplo.com" required>
                        <small id="correoError" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="password">ContraseûÝa</label>
                        <input type="password" id="password" name="password" placeholder="MûÙnimo 6 caracteres" required>
                        <small id="passwordError" class="error-text"></small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirmar ContraseûÝa</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite tu contraseûÝa" required>
                        <small id="confirmPasswordError" class="error-text"></small>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span class="btn-icon">ã</span>
                        Registrarse
                    </button>

                </form>

                <div class="divider"></div>

                <button class="btn btn-secondary" onclick="window.location.href='/login'">
                    ô¢Ya tienes cuenta? Inicia sesiû°n aquûÙ
                </button>

                <div id="message" class="message"></div>
            </div>

        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');

        function limpiarErrores() {
            const errores = document.querySelectorAll('.error-text');
            errores.forEach(error => { error.textContent = ''; });
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => { input.classList.remove('error'); });
            messageDiv.innerHTML = '';
        }

        function mostrarError(inputId, errorId, mensaje) {
            document.getElementById(errorId).textContent = mensaje;
            document.getElementById(inputId).classList.add('error');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            limpiarErrores();

            const nombres = document.getElementById('nombres').value.trim();
            const apellidos = document.getElementById('apellidos').value.trim();
            const dni = document.getElementById('dni').value.trim();
            const celular = document.getElementById('celular').value.trim();
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (!/^[A-Za-zûûûûûûÀûˋûÙû°û¤ûûÝ\s]+$/.test(nombres)) {
                mostrarError('nombres', 'nombresError', 'El nombre no puede contener nû¤meros ni sûÙmbolos');
                return;
            }
            if (!/^[A-Za-zûûûûûûÀûˋûÙû°û¤ûûÝ\s]+$/.test(apellidos)) {
                mostrarError('apellidos', 'apellidosError', 'El apellido no puede contener nû¤meros ni sûÙmbolos');
                return;
            }
            if (!/^\d{8}$/.test(dni)) {
                mostrarError('dni', 'dniError', 'El DNI debe tener 8 nû¤meros');
                return;
            }
            if (!/^9\d{8}$/.test(celular)) {
                mostrarError('celular', 'celularError', 'El celular debe tener 9 nû¤meros y comenzar con 9');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) {
                mostrarError('correo', 'correoError', 'Ingresa un correo vûÀlido');
                return;
            }
            if (password.length < 6) {
                mostrarError('password', 'passwordError', 'La contraseûÝa debe tener mûÙnimo 6 caracteres');
                return;
            }
            if (password !== confirmPassword) {
                mostrarError('confirm_password', 'confirmPasswordError', 'Las contraseûÝas no coinciden');
                return;
            }

            messageDiv.innerHTML = '<div class="loading">Creando cuenta...</div>';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombres, apellidos, dni, celular, correo, password })
                });

                if (!response.ok) { throw new Error('Error del servidor'); }

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="success">ã ' + data.message + '</div>';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    messageDiv.innerHTML = '<div class="error">ã ' + data.message + '</div>';
                }
            } catch (error) {
                console.error(error);
                messageDiv.innerHTML = '<div class="error">ã Error de conexiû°n o del servidor</div>';
            }
        });
    </script>
</body>
</html>
